name: Refresh event data

on:
  schedule:
    - cron: '0 12 * * 1'
  push:
    branches:
      - main
    paths-ignore:
      - data/events.json
      - raw-data/events.csv
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Playwright
        run: |
          pip install playwright
          python -m playwright install chromium --with-deps

      - name: Scrape latest events
        run: python scripts/scrape_events.py

      - name: Scrape latest movies
        run: python scripts/scrape_movies.py

      - name: Commit updated data
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: refresh scraped events'
          file_pattern: data/events.json raw-data/events.csv data/movies.json raw-data/movies.csv
