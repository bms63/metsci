<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Facehuggers</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Facehuggers</h1>
    <img src="assets/facehugger.svg" alt="Silly facehugger illustration" class="hero-image" />
    <p class="subtitle">Philadelphia venue events in one place.</p>
  </header>

  <main>
    <nav class="tab-nav" role="tablist">
      <button class="tab-btn tab-btn--active" role="tab" aria-selected="true" aria-controls="panel-concerts" id="tab-concerts">Concerts</button>
      <button class="tab-btn" role="tab" aria-selected="false" aria-controls="panel-movies" id="tab-movies">Movies</button>
    </nav>

    <section id="panel-concerts" role="tabpanel" aria-labelledby="tab-concerts">
      <p id="scrape-alert" class="alert">Loading latest scrape time...</p>
      <label for="search" class="search-label">Filter shows</label>
      <input id="search" type="search" placeholder="Search band, venue, or date" />

      <table id="events-table" aria-label="Facehuggers events table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Bands</th>
            <th>Venue</th>
            <th>Link</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

    <section id="panel-movies" role="tabpanel" aria-labelledby="tab-movies" hidden>
      <p id="movies-alert" class="alert">Loading latest scrape time...</p>
      <label for="movies-search" class="search-label">Filter movies</label>
      <input id="movies-search" type="search" placeholder="Search movie, genre, or location" />

      <table id="movies-table" aria-label="Landmark Theatres movies table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Movie</th>
            <th>Genre</th>
            <th>Location</th>
            <th>Tickets</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>
  </main>

  <script src="scripts/app.js"></script>
</body>
</html>
